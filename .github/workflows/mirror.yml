name: Mirror to Codeberg
on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * 0'
  push:
    branches: [main]
jobs:
  codeberg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror repository
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git remote add codeberg https://codeberg.org/gl0bal01/discord-ai-assistant.git || true
          git -c http.https://codeberg.org/.extraheader="Authorization: basic $(echo -n "gl0bal01:${CODEBERG_TOKEN}" | base64)" push codeberg --all --force
          git -c http.https://codeberg.org/.extraheader="Authorization: basic $(echo -n "gl0bal01:${CODEBERG_TOKEN}" | base64)" push codeberg --tags --force
